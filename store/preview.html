  <body>
    <main class="shell preview-shell">
      <nav class="preview-nav" aria-label="Preview navigation">
        <a href="./">Back to store</a>
        <a href="https://github.com/MatthewPaver/MatthewPaver">GitHub profile</a>
      </nav>

      <section class="preview-hero">
        <noscript>
          <article class="preview-panel no-script-panel">
            <h1>Project previews need JavaScript.</h1>
            <p>
              The main store still works without JavaScript. Open the store to browse every project card,
              direct repo link, live product link, and case study link.
            </p>
            <p>
              <a class="button primary" href="./#project-grid-heading">Back to store</a>
            </p>
          </article>
        </noscript>
        <div class="preview-copy">
          <p id="preview-kicker" class="eyebrow">Selected work</p>
          <h1 id="preview-title">Project preview</h1>
          <p id="preview-summary" class="lede"></p>
          <div id="preview-actions" class="preview-actions"></div>
        </div>

        <figure class="preview-media">
          <img id="preview-image" src="./assets/inference-brief.png" width="1280" height="720" alt="" />
          <video id="preview-video" hidden controls muted playsinline preload="metadata"></video>
          <figcaption class="preview-meta">
            <div>
              <span>Role</span>
              <strong id="preview-role"></strong>
            </div>
            <div>
              <span>Status</span>
              <strong id="preview-status"></strong>
            </div>
            <div>
              <span>Focus</span>
              <strong id="preview-focus"></strong>
            </div>
          </figcaption>
        </figure>
      </section>

      <section class="preview-layout">
        <article class="preview-panel">
          <h2>What it solves</h2>
          <p id="preview-problem"></p>
          <ul id="preview-points" class="preview-list"></ul>
        </article>

        <aside class="preview-panel">
          <h3>Stack</h3>
          <div id="preview-stack" class="preview-stack"></div>
          <p id="preview-note" class="motion-note"></p>
        </aside>
      </section>

      <footer class="footer">
        <p>Portfolio store · Build <a id="build-sha" href="https://github.com/MatthewPaver/MatthewPaver/commits/main">dev</a></p>
        <a href="./">Back to store</a>
      </footer>
    </main>

    <script src="./preview.js?v=20260517-2"></script>
