<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Architexa workflow visual</title>
  <desc id="desc">A portfolio thumbnail showing the Architexa dataset, conditional GAN, Flask API, and generated architecture output checks.</desc>
  <rect width="1200" height="680" fill="#EFF3F1"/>
  <rect x="42" y="42" width="1116" height="596" fill="#FFFFFF" stroke="#151515" stroke-width="4"/>
  <text x="82" y="110" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="900" letter-spacing="5" fill="#0F766E">ARCHITEXA</text>
  <text x="82" y="176" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#151515">Architecture image generation</text>
  <text x="84" y="222" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#57534E">Dataset curation, conditional GAN training, API serving, and output inspection.</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="82" y="302" width="244" height="214" fill="#F4F0E9" stroke="#151515" stroke-width="3"/>
    <text x="112" y="354" font-size="26" font-weight="900" fill="#151515">Dataset</text>
    <text x="112" y="396" font-size="18" font-weight="800" fill="#57534E">labelled styles</text>
    <path d="M116 444H292M116 472H252" stroke="#0F766E" stroke-width="10"/>

    <rect x="478" y="274" width="244" height="270" fill="#151515" stroke="#8F5D12" stroke-width="3"/>
    <text x="514" y="340" font-size="30" font-weight="900" fill="#FFFFFF">cGAN</text>
    <text x="514" y="386" font-size="18" font-weight="800" fill="#D8D2C8">conditioned input</text>
    <text x="514" y="422" font-size="18" font-weight="800" fill="#D8D2C8">training loop</text>
    <text x="514" y="458" font-size="18" font-weight="800" fill="#D8D2C8">sample review</text>

    <rect x="874" y="302" width="244" height="214" fill="#F4F0E9" stroke="#151515" stroke-width="3"/>
    <text x="904" y="354" font-size="26" font-weight="900" fill="#151515">Flask API</text>
    <text x="904" y="396" font-size="18" font-weight="800" fill="#57534E">generate + inspect</text>
    <rect x="910" y="436" width="74" height="50" fill="#0F766E"/>
    <rect x="998" y="436" width="74" height="50" fill="#1D4F91"/>
  </g>

  <path d="M342 410H458M738 410H854" stroke="#151515" stroke-width="7"/>
  <path d="M458 410L438 392M458 410L438 428M854 410L834 392M854 410L834 428" stroke="#151515" stroke-width="7" stroke-linecap="round"/>
  <rect x="82" y="568" width="1036" height="28" fill="#D8D2C8"/>
  <rect x="82" y="568" width="690" height="28" fill="#0F766E"/>
  <text x="102" y="589" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="900" fill="#FFFFFF">Portfolio signal: ML pipeline plus product API boundary</text>
