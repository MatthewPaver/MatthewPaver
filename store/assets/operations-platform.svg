  <text x="72" y="154" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#161411">Resident requests, payments, and tickets</text>
  <text x="74" y="198" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#4E473F">Private prototype for property operations, service-charge clarity, audit trails, and AI triage.</text>

