<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Operations platform prototype</title>
  <desc id="desc">A safe visual showing a private operations platform prototype for resident requests, payments, tickets, and AI triage.</desc>
  <rect width="1200" height="680" fill="#F7F1E6"/>
