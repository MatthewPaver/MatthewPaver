    <text x="114" y="275" fill="#fffaf0" font-family="Georgia, serif" font-size="78" font-weight="700">Decide what ships</text>
    <text x="114" y="354" fill="#fffaf0" font-family="Georgia, serif" font-size="78" font-weight="700">before the model</text>
    <text x="114" y="433" fill="#fffaf0" font-family="Georgia, serif" font-size="78" font-weight="700">reaches users.</text>
    <rect x="794" y="126" width="332" height="370" fill="#1b1f18" stroke="#30352c" stroke-width="2"/>
    <text x="830" y="182" fill="#747168" font-size="14" font-weight="900" letter-spacing="2">SUITE HEALTH</text>
