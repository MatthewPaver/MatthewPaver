<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI Workflow Evaluator thumbnail</title>
  <desc id="desc">A dark evaluation operations console thumbnail with suite health, quality gates, and trace-level decisions.</desc>
  <rect width="1200" height="675" fill="#0d0f0c"/>
  <defs>
    <radialGradient id="halo" cx="84%" cy="4%" r="72%">
      <stop offset="0" stop-color="#d9ff8c" stop-opacity=".18"/>
      <stop offset=".55" stop-color="#0d0f0c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0v28" fill="none" stroke="#20251d" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#halo)"/>
  <rect width="1200" height="675" fill="url(#grid)" opacity=".65"/>
  <g font-family="Avenir Next, Segoe UI, sans-serif">
