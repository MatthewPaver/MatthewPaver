<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Recommendation system metrics visual</title>
  <desc id="desc">A visual for a dating app recommendation system showing implicit-feedback ranking, temporal holdout evaluation, and top-K metrics.</desc>
  <rect width="1200" height="680" fill="#FFF8EB"/>
  <rect x="36" y="36" width="1128" height="608" fill="#F7F1E6" stroke="#161411" stroke-width="4"/>
  <text x="78" y="104" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="900" letter-spacing="5" fill="#AD3F32">RECOMMENDATION SYSTEM</text>
  <text x="78" y="170" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#161411">Swipe data into ranked candidates</text>
  <text x="80" y="214" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#4E473F">Implicit feedback, temporal holdout, matrix factorisation, and Top-K evaluation.</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="78" y="294" width="300" height="188" fill="#161411"/>
    <text x="108" y="356" font-size="44" font-weight="900" fill="#D9A441">Implicit</text>
    <text x="112" y="404" font-size="24" font-weight="900" fill="#FFF8EB">feedback ranking</text>
    <text x="112" y="442" font-size="18" font-weight="800" fill="#CFC4B3">behaviour-based signal</text>

    <rect x="450" y="294" width="300" height="188" fill="#0D6F5F"/>
    <text x="482" y="356" font-size="50" font-weight="900" fill="#FFF8EB">Top-K</text>
    <text x="486" y="404" font-size="24" font-weight="900" fill="#FFF8EB">ranking metrics</text>
    <text x="486" y="442" font-size="18" font-weight="800" fill="#D4EFEA">recommendation quality</text>

    <rect x="822" y="294" width="300" height="188" fill="#1F5F9F"/>
    <text x="854" y="356" font-size="42" font-weight="900" fill="#FFF8EB">Temporal</text>
    <text x="858" y="404" font-size="24" font-weight="900" fill="#FFF8EB">holdout split</text>
    <text x="858" y="442" font-size="18" font-weight="800" fill="#D3E5F6">future-aware evaluation</text>
  </g>

  <path d="M176 552C266 508 348 618 438 574C528 530 612 530 706 572C800 614 884 508 1024 552" stroke="#AD3F32" stroke-width="8" stroke-linecap="round"/>
  <circle cx="176" cy="552" r="12" fill="#AD3F32"/>
  <circle cx="438" cy="574" r="12" fill="#AD3F32"/>
  <circle cx="706" cy="572" r="12" fill="#AD3F32"/>
  <circle cx="1024" cy="552" r="12" fill="#AD3F32"/>
</svg>
