<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Smart job market intelligence workflow</title>
  <desc id="desc">A portfolio thumbnail showing job listings moving through ingestion, normalisation, signal extraction, and alerting.</desc>
  <rect width="1200" height="680" fill="#FBFAF7"/>
  <rect x="42" y="42" width="1116" height="596" fill="#FFFFFF" stroke="#151515" stroke-width="4"/>
  <rect x="42" y="42" width="1116" height="86" fill="#151515"/>
  <text x="78" y="95" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900" letter-spacing="4" fill="#F4F0E9">JOB MARKET INTELLIGENCE</text>
  <text x="78" y="190" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#151515">Listings into market signals</text>
  <text x="80" y="232" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#57534E">Scrape volume, salary, skills, and remote-work shifts from messy job boards.</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="78" y="306" width="220" height="148" fill="#F4F0E9" stroke="#151515" stroke-width="3"/>
