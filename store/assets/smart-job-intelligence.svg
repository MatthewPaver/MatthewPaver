    <text x="108" y="394" font-size="18" font-weight="800" fill="#57534E">listing crawlers</text>
    <rect x="350" y="306" width="220" height="148" fill="#0F766E" stroke="#151515" stroke-width="3"/>
    <text x="380" y="358" font-size="26" font-weight="900" fill="#FFFFFF">Normalise</text>
    <text x="380" y="394" font-size="18" font-weight="800" fill="#DDF4EF">salary + skills</text>
    <rect x="622" y="306" width="220" height="148" fill="#1D4F91" stroke="#151515" stroke-width="3"/>
    <text x="652" y="358" font-size="26" font-weight="900" fill="#FFFFFF">Signals</text>
    <text x="652" y="394" font-size="18" font-weight="800" fill="#DCE8F7">trend reports</text>
    <rect x="894" y="306" width="220" height="148" fill="#8F5D12" stroke="#151515" stroke-width="3"/>
    <text x="924" y="358" font-size="26" font-weight="900" fill="#FFFFFF">Alerts</text>
    <text x="924" y="394" font-size="18" font-weight="800" fill="#FFF3CF">API tier design</text>
  </g>
