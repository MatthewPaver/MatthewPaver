name: Deploy Idea Store

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Validate store catalogue
        run: npm test

      - name: Inject build SHA
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          LONG_SHA="${GITHUB_SHA}"
          REPLACEMENT="id=\"build-sha\" href=\"https://github.com/MatthewPaver/MatthewPaver/commit/${LONG_SHA}\">${SHORT_SHA}"
          find store -name "*.html" -exec sed -i "s|id=\"build-sha\" href=\"[^\"]*\">dev|${REPLACEMENT}|g" {} +

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
