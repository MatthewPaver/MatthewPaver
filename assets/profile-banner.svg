<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="Matthew Paver — AI products, data systems, and analytics">
  <defs>
    <radialGradient id="glowTeal" cx="80%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#0f766e" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="0%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#8f5d12" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#8f5d12" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#a9a195" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1280" height="360" fill="#fbfaf7"/>
  <rect width="1280" height="360" fill="url(#dots)"/>
  <rect width="1280" height="360" fill="url(#glowTeal)"/>
  <rect width="1280" height="360" fill="url(#glowGold)"/>

  <!-- accent rule that draws in on load -->
  <rect x="80" y="92" width="0" height="2" fill="#0f766e">
    <animate attributeName="width" from="0" to="38" dur="0.9s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1"/>
  </rect>
  <text x="130" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="900" letter-spacing="2.6" fill="#69625b" opacity="0">
    PORTFOLIO STORE
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.4s" fill="freeze"/>
  </text>

  <!-- name -->
  <text x="80" y="178" font-family="'Iowan Old Style', Georgia, 'Times New Roman', serif" font-size="68" font-weight="700" fill="#151515" letter-spacing="-0.5" opacity="0">
    Matthew Paver
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.55s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 12" to="0 0" dur="0.9s" begin="0.55s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
  </text>

  <!-- tagline -->
  <text x="80" y="226" font-family="'Iowan Old Style', Georgia, serif" font-size="26" font-weight="400" fill="#57534e" opacity="0">
    I build AI products and the data systems behind them.
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.85s" fill="freeze"/>
  </text>

  <!-- horizontal rule -->
  <line x1="80" y1="262" x2="80" y2="262" stroke="#d8d2c8" stroke-width="1">
    <animate attributeName="x2" from="80" to="1040" dur="0.9s" begin="0.95s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
  </line>

  <!-- spec strip -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" opacity="0">
    <text x="80" y="296" font-size="11" font-weight="900" letter-spacing="1.6" fill="#69625b">SHIPPING</text>
    <text x="80" y="318" font-size="14" font-weight="600" fill="#151515">Inference Brief — live</text>

    <text x="320" y="296" font-size="11" font-weight="900" letter-spacing="1.6" fill="#69625b">BASED</text>
    <text x="320" y="318" font-size="14" font-weight="600" fill="#151515">London</text>

    <text x="500" y="296" font-size="11" font-weight="900" letter-spacing="1.6" fill="#69625b">OPEN TO</text>
    <text x="500" y="318" font-size="14" font-weight="600" fill="#151515">Product · data · automation work</text>

    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="1.1s" fill="freeze"/>
  </g>

  <!-- live dot with ripple -->
  <g transform="translate(234 313)" opacity="0">
    <circle r="9" fill="none" stroke="#16a34a" stroke-width="1.4">
      <animate attributeName="r" from="4" to="14" dur="1.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.16 1 0.3 1"/>
      <animate attributeName="opacity" from="0.7" to="0" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#16a34a"/>
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="1.2s" fill="freeze"/>
  </g>

  <!-- MP mark on the right -->
  <g transform="translate(1080 100)" opacity="0">
    <rect width="120" height="120" rx="16" fill="#d9a441"/>
    <text x="60" y="84" font-family="'Iowan Old Style', Georgia, serif" font-size="68" font-weight="700" fill="#161411" text-anchor="middle">MP</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.25s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="1092 100" to="1080 100" dur="0.9s" begin="0.25s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
  </g>
</svg>
