<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Matthew Paver portfolio banner</title>
  <desc id="desc">A portfolio storefront banner for AI, data, automation, and product systems.</desc>
  <rect width="1200" height="360" fill="#F7F1E6"/>
