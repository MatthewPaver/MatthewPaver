  <text x="54" y="148" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="900" letter-spacing="4" fill="#AD3F32">AI, DATA, AUTOMATION, ANALYTICS</text>
  <text x="54" y="204" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#161411">Systems from messy inputs.</text>
  <text x="54" y="256" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#161411">Products people can inspect.</text>
  <text x="58" y="302" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#4E473F">A curated app-store style profile for live products, private systems, and public proof.</text>

  <g transform="translate(800 66)">
